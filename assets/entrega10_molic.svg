<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 620" width="1700" height="620">
  <defs>
    <style>
      text { font-family: Consolas, 'Courier New', monospace; }
      .title  { font-size:16px; fill:#1a1a2e; font-weight:700; text-anchor:middle; }
      .sub    { font-size:10px; fill:#999; text-anchor:middle; }
      .cn     { font-size:11px; fill:#1a1a2e; font-weight:700; text-anchor:middle; dominant-baseline:central; }
      .cu     { font-size:10px; fill:#1a3a8f; text-anchor:middle; dominant-baseline:central; }
      .cs     { font-size:10px; fill:#1a6b2a; text-anchor:middle; dominant-baseline:central; }
      .cr     { font-size:10px; fill:#b36000; font-weight:700; text-anchor:middle; dominant-baseline:central; }
      .elabel { font-size:9px;  fill:#555; text-anchor:middle; }
      .rlabel { font-size:9px;  fill:#b36000; text-anchor:middle; }
      .leg    { font-size:11px; fill:#444; dominant-baseline:central; }
      .e      { stroke:#1a1a2e; stroke-width:1.8; fill:none; }
      .er     { stroke:#d4820a; stroke-width:1.5; fill:none; stroke-dasharray:6,3; }
    </style>
    <marker id="arr"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a1a2e"/>
    </marker>
    <marker id="arrr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d4820a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1700" height="620" fill="#f7f4ef" rx="10"/>
  <text x="850" y="30" class="title">Diagrama MOLIC — GAIA · Fluxo do Especialista</text>
  <text x="850" y="48" class="sub">Model of Interaction as Conversation — Barbosa e Silva (2010)</text>

  <!-- ══════════════════════════════════════════
       LINHA 1: INÍCIO → C1 → C2 → C3 → C4
       Y centro = 110
       X centros: 80, 260, 520, 780, 1070
  ══════════════════════════════════════════ -->

  <!-- INÍCIO -->
  <ellipse cx="80" cy="110" rx="55" ry="26" fill="#1a1a2e"/>
  <text x="80" y="110" class="cn" fill="#fff">INÍCIO</text>

  <!-- C1: Login -->
  <rect x="162" y="80" width="240" height="60" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="282" y="100" class="cn">C1: Tela de Login</text>
  <text x="282" y="116" class="cu">U: Seleciona perfil + credenciais</text>
  <text x="282" y="130" class="cs">S: Valida → redireciona dashboard</text>

  <!-- C2: Dashboard -->
  <rect x="440" y="80" width="240" height="60" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="560" y="100" class="cn">C2: Dashboard</text>
  <text x="560" y="116" class="cu">U: Visualiza análises anteriores</text>
  <text x="560" y="130" class="cs">S: Lista cards por data</text>

  <!-- C3: Nova Análise -->
  <rect x="718" y="80" width="240" height="60" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="838" y="100" class="cn">C3: Nova Análise</text>
  <text x="838" y="116" class="cu">U: Preenche ID e nº sessão</text>
  <text x="838" y="130" class="cs">S: Exibe formulário de upload</text>

  <!-- C4: Upload -->
  <rect x="1000" y="80" width="240" height="60" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1120" y="100" class="cn">C4: Upload de Vídeo</text>
  <text x="1120" y="116" class="cu">U: Arrasta arquivo para zona</text>
  <text x="1120" y="130" class="cs">S: Confirma recebimento</text>

  <!-- ══════════════════════════════════════════
       LINHA 2: C5 → C6 → C7 → FIM
       Y centro = 310
       X centros: 1120, 838, 560, 282
  ══════════════════════════════════════════ -->

  <!-- C5: Processamento -->
  <rect x="1000" y="280" width="240" height="60" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1120" y="300" class="cn">C5: Processamento</text>
  <text x="1120" y="316" class="cs">S: Pipeline YOLOv8 + MediaPipe</text>
  <text x="1120" y="330" class="cs">S: Barra de progresso + tempo</text>

  <!-- C6: Resultado -->
  <rect x="706" y="270" width="256" height="80" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="834" y="290" class="cn">C6: Resultado / Prognóstico</text>
  <text x="834" y="306" class="cs">S: Exibe P(TEA) + métricas</text>
  <text x="834" y="320" class="cu">U: Lê indicadores e insights</text>
  <text x="834" y="334" class="cs">S: Player com camadas IA</text>

  <!-- C7: Exportar -->
  <rect x="440" y="284" width="240" height="52" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="560" y="304" class="cn">C7: Exportar PDF</text>
  <text x="560" y="320" class="cu">U: Clica "Exportar Relatório"</text>

  <!-- FIM -->
  <ellipse cx="282" cy="310" rx="70" ry="28" fill="#1a6b2a"/>
  <text x="282" y="310" class="cn" fill="#fff">FIM / Home</text>

  <!-- ══════════════════════════════════════════
       ARESTAS NORMAIS
  ══════════════════════════════════════════ -->

  <!-- INÍCIO → C1 -->
  <line x1="135" y1="110" x2="160" y2="110" class="e" marker-end="url(#arr)"/>

  <!-- C1 → C2 -->
  <line x1="402" y1="110" x2="438" y2="110" class="e" marker-end="url(#arr)"/>
  <text x="420" y="104" class="elabel">login OK</text>

  <!-- C2 → C3 -->
  <line x1="680" y1="110" x2="716" y2="110" class="e" marker-end="url(#arr)"/>
  <text x="698" y="104" class="elabel">clica ＋</text>

  <!-- C3 → C4 -->
  <line x1="958" y1="110" x2="998" y2="110" class="e" marker-end="url(#arr)"/>
  <text x="978" y="104" class="elabel">confirma</text>

  <!-- C4 ↓ C5 (desce) -->
  <line x1="1120" y1="140" x2="1120" y2="278" class="e" marker-end="url(#arr)"/>
  <text x="1140" y="212" class="elabel">upload OK</text>

  <!-- C5 → C6 (vai para esquerda) -->
  <line x1="1000" y1="310" x2="964" y2="310" class="e" marker-end="url(#arr)"/>
  <text x="982" y="303" class="elabel">concluído</text>

  <!-- C6 → C7 -->
  <line x1="706" y1="310" x2="682" y2="310" class="e" marker-end="url(#arr)"/>
  <text x="694" y="303" class="elabel">exportar</text>

  <!-- C7 → FIM -->
  <line x1="440" y1="310" x2="354" y2="310" class="e" marker-end="url(#arr)"/>
  <text x="397" y="303" class="elabel">PDF gerado</text>

  <!-- C2 → FIM (ver análise existente, curva) -->
  <path d="M560,140 Q560,200 440,260 Q380,280 354,305" class="e" marker-end="url(#arr)"/>
  <text x="470" y="220" class="elabel">ver análise existente</text>

  <!-- ══════════════════════════════════════════
       RUPTURAS — losangos posicionados com espaço
  ══════════════════════════════════════════ -->

  <!-- R1: abaixo de C1 — Y=180 -->
  <polygon points="282,168 318,188 282,208 246,188" fill="#fff8f0" stroke="#d4820a" stroke-width="2"/>
  <text x="282" y="184" class="cr">R1</text>
  <text x="282" y="196" class="cr" style="font-size:8.5px;">Credencial inválida</text>

  <line x1="282" y1="140" x2="282" y2="166" class="er" marker-end="url(#arrr)"/>
  <path d="M246,188 Q200,188 200,140 Q200,110 162,110" class="er" marker-end="url(#arrr)"/>
  <text x="175" y="162" class="rlabel">retry</text>

  <!-- R2: à direita de C4 — X=1330 -->
  <polygon points="1330,110 1366,130 1330,150 1294,130" fill="#fff8f0" stroke="#d4820a" stroke-width="2"/>
  <text x="1330" y="126" class="cr">R2</text>
  <text x="1330" y="138" class="cr" style="font-size:8.5px;">Formato inválido</text>

  <line x1="1240" y1="110" x2="1292" y2="110" class="er" marker-end="url(#arrr)"/>
  <path d="M1366,130 Q1420,130 1420,80 Q1420,60 1242,60 Q1110,60 1000,62" class="er" marker-end="url(#arrr)"/>
  <text x="1390" y="93" class="rlabel">retry</text>

  <!-- R3: abaixo de C5 — Y=380 -->
  <polygon points="1120,358 1160,380 1120,402 1080,380" fill="#fff8f0" stroke="#d4820a" stroke-width="2"/>
  <text x="1120" y="376" class="cr">R3</text>
  <text x="1120" y="388" class="cr" style="font-size:8.5px;">Falha no processo</text>

  <line x1="1120" y1="340" x2="1120" y2="356" class="er" marker-end="url(#arrr)"/>
  <path d="M1080,380 Q1040,380 1040,310 Q1040,140 1000,140" class="er" marker-end="url(#arrr)"/>
  <text x="1044" y="270" class="rlabel">retry</text>

  <!-- R4: abaixo de C6 — Y=390 -->
  <polygon points="834,378 874,400 834,422 794,400" fill="#fff8f0" stroke="#d4820a" stroke-width="2"/>
  <text x="834" y="396" class="cr">R4</text>
  <text x="834" y="408" class="cr" style="font-size:8.5px;">Frames insuficientes</text>

  <line x1="834" y1="350" x2="834" y2="376" class="er" marker-end="url(#arrr)"/>
  <path d="M794,400 Q754,400 754,310 Q754,110 718,110" class="er" marker-end="url(#arrr)"/>
  <text x="730" y="270" class="rlabel">re-upload</text>

  <!-- ══════════════════════════════════════════
       LEGENDA  (Y=460)
  ══════════════════════════════════════════ -->
  <rect x="60" y="452" width="1580" height="100" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <text x="80" y="476" style="font-size:12px;fill:#1a1a2e;font-weight:700;dominant-baseline:central;">Legenda</text>

  <!-- Cena -->
  <rect x="80" y="490" width="70" height="28" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="115" y="504" class="cn">Cena</text>
  <text x="160" y="504" class="leg">= estado da interface onde ocorre interação (falas U e S)</text>

  <!-- Ruptura -->
  <polygon points="640,490 666,504 640,518 614,504" fill="#fff8f0" stroke="#d4820a" stroke-width="2"/>
  <text x="640" y="504" class="cr">R</text>
  <text x="680" y="504" class="leg">= Ruptura de comunicação (erro / desvio)</text>

  <!-- Fluxo normal -->
  <line x1="80" y1="533" x2="140" y2="533" class="e" marker-end="url(#arr)"/>
  <text x="152" y="533" class="leg">= Fluxo normal</text>

  <!-- Fluxo ruptura -->
  <line x1="310" y1="533" x2="370" y2="533" class="er" marker-end="url(#arrr)"/>
  <text x="382" y="533" class="leg">= Fluxo de ruptura / recuperação</text>

  <text x="640" y="533" style="font-size:10px;fill:#1a3a8f;font-weight:600;dominant-baseline:central;">U:</text>
  <text x="658" y="533" class="leg">fala do usuário</text>
  <text x="790" y="533" style="font-size:10px;fill:#1a6b2a;font-weight:600;dominant-baseline:central;">S:</text>
  <text x="808" y="533" class="leg">fala do sistema</text>
  <text x="950" y="533" class="leg">Elipses = estados terminais (Início / Fim)</text>
</svg>
