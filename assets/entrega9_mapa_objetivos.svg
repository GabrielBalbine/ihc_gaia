<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 470" width="1400" height="470">
  <defs>
    <style>
      text { font-family: 'IBM Plex Mono', Consolas, monospace; }
      .title  { font-size:15px; fill:#1a1a2e; font-weight:700; text-anchor:middle; }
      .t-root { font-size:12px; fill:#fff; font-weight:700; text-anchor:middle; dominant-baseline:central; }
      .t-sub  { font-size:11px; fill:#fff; font-weight:600; text-anchor:middle; dominant-baseline:central; }
      .t-task { font-size:10px; fill:#1a1a2e; text-anchor:middle; dominant-baseline:central; }
      .t-act  { font-size:9px;  fill:#444;   text-anchor:middle; dominant-baseline:central; }
      .t-rupt { font-size:9px;  fill:#7a4000; text-anchor:middle; dominant-baseline:central; }
      .t-leg  { font-size:10px; fill:#444; dominant-baseline:central; }
      .edge   { stroke:#1a1a2e; stroke-width:1.5; fill:none; }
    </style>
  </defs>

  <rect width="1400" height="470" fill="#f5f0e8" rx="8"/>
  <text x="700" y="28" class="title">Mapa de Objetivos — GAIA · Dra. Helena (Especialista)</text>

  <!-- RAIZ -->
  <rect x="490" y="44" width="420" height="46" rx="6" fill="#1a1a2e"/>
  <text x="700" y="61" class="t-root">Obter prognóstico auxiliar de TEA</text>
  <text x="700" y="79" class="t-root" style="font-size:10px;font-weight:400;">a partir de vídeo de sessão terapêutica</text>

  <line x1="700" y1="90" x2="700" y2="110" class="edge"/>
  <line x1="160" y1="110" x2="1240" y2="110" class="edge"/>

  <!-- SUB 1: Acessar — centro X=200 -->
  <line x1="200" y1="110" x2="200" y2="128" class="edge"/>
  <rect x="100" y="128" width="200" height="40" rx="5" fill="#2c3e6e"/>
  <text x="200" y="144" class="t-sub">1. Acessar</text>
  <text x="200" y="159" class="t-sub">o sistema</text>

  <!-- SUB 2: Enviar vídeo — centro X=500 -->
  <line x1="500" y1="110" x2="500" y2="128" class="edge"/>
  <rect x="385" y="128" width="230" height="40" rx="5" fill="#2c3e6e"/>
  <text x="500" y="144" class="t-sub">2. Enviar vídeo</text>
  <text x="500" y="159" class="t-sub">para análise</text>

  <!-- SUB 3: Acompanhar — centro X=830 -->
  <line x1="830" y1="110" x2="830" y2="128" class="edge"/>
  <rect x="700" y="128" width="260" height="40" rx="5" fill="#2c3e6e"/>
  <text x="830" y="144" class="t-sub">3. Acompanhar</text>
  <text x="830" y="159" class="t-sub">processamento</text>

  <!-- SUB 4: Interpretar — centro X=1160 -->
  <line x1="1160" y1="110" x2="1160" y2="128" class="edge"/>
  <rect x="1020" y="128" width="280" height="40" rx="5" fill="#2c3e6e"/>
  <text x="1160" y="144" class="t-sub">4. Interpretar resultado</text>
  <text x="1160" y="159" class="t-sub">e exportar</text>

  <!-- ── TAREFAS (nível 2) ── -->

  <!-- Sub1 tarefas: X=130, X=280 -->
  <line x1="200" y1="168" x2="200" y2="190" class="edge"/>
  <line x1="130" y1="190" x2="280" y2="190" class="edge"/>
  <line x1="130" y1="190" x2="130" y2="206" class="edge"/>
  <rect x="44"  y="206" width="172" height="32" rx="3" fill="#fff" stroke="#1a1a2e" stroke-width="1.8"/>
  <text x="130" y="222" class="t-task">Selecionar perfil</text>
  <line x1="280" y1="190" x2="280" y2="206" class="edge"/>
  <rect x="194" y="206" width="172" height="32" rx="3" fill="#fff" stroke="#1a1a2e" stroke-width="1.8"/>
  <text x="280" y="222" class="t-task">Inserir credenciais</text>

  <!-- Sub2 tarefas: X=415, X=590 -->
  <line x1="500" y1="168" x2="500" y2="190" class="edge"/>
  <line x1="415" y1="190" x2="590" y2="190" class="edge"/>
  <line x1="415" y1="190" x2="415" y2="206" class="edge"/>
  <rect x="325" y="206" width="180" height="32" rx="3" fill="#fff" stroke="#1a1a2e" stroke-width="1.8"/>
  <text x="415" y="222" class="t-task">Identificar paciente</text>
  <line x1="590" y1="190" x2="590" y2="206" class="edge"/>
  <rect x="500" y="206" width="180" height="32" rx="3" fill="#fff" stroke="#1a1a2e" stroke-width="1.8"/>
  <text x="590" y="222" class="t-task">Selecionar arquivo</text>

  <!-- Sub3 tarefas: X=740, X=930 -->
  <line x1="830" y1="168" x2="830" y2="190" class="edge"/>
  <line x1="740" y1="190" x2="930" y2="190" class="edge"/>
  <line x1="740" y1="190" x2="740" y2="206" class="edge"/>
  <rect x="648" y="206" width="184" height="32" rx="3" fill="#fff" stroke="#1a1a2e" stroke-width="1.8"/>
  <text x="740" y="222" class="t-task">Ver progresso pipeline</text>
  <line x1="930" y1="190" x2="930" y2="206" class="edge"/>
  <rect x="838" y="206" width="184" height="32" rx="3" fill="#fff" stroke="#1a1a2e" stroke-width="1.8"/>
  <text x="930" y="222" class="t-task">Receber notificação</text>

  <!-- Sub4 tarefas: X=1060, X=1180, X=1300 -->
  <line x1="1160" y1="168" x2="1160" y2="190" class="edge"/>
  <line x1="1060" y1="190" x2="1310" y2="190" class="edge"/>
  <line x1="1060" y1="190" x2="1060" y2="206" class="edge"/>
  <rect x="972"  y="206" width="176" height="32" rx="3" fill="#fff" stroke="#1a1a2e" stroke-width="1.8"/>
  <text x="1060" y="222" class="t-task">Ver indicador P(TEA)</text>
  <line x1="1185" y1="190" x2="1185" y2="206" class="edge"/>
  <rect x="1097" y="206" width="176" height="32" rx="3" fill="#fff" stroke="#1a1a2e" stroke-width="1.8"/>
  <text x="1185" y="222" class="t-task">Analisar métricas</text>
  <line x1="1310" y1="190" x2="1310" y2="206" class="edge"/>
  <rect x="1225" y="206" width="162" height="32" rx="3" fill="#fff" stroke="#1a1a2e" stroke-width="1.8"/>
  <text x="1306" y="222" class="t-task">Exportar relatório</text>

  <!-- ── AÇÕES (nível 3) ── -->

  <line x1="130" y1="238" x2="130" y2="254" class="edge"/>
  <rect x="44"  y="254" width="172" height="26" rx="3" fill="#f0ece4" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="130" y="267" class="t-act">Toggle Admin/Especialista</text>

  <line x1="280" y1="238" x2="280" y2="254" class="edge"/>
  <rect x="194" y="254" width="172" height="26" rx="3" fill="#f0ece4" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="280" y="267" class="t-act">Digitar e-mail + senha</text>

  <line x1="415" y1="238" x2="415" y2="254" class="edge"/>
  <rect x="325" y="254" width="180" height="26" rx="3" fill="#f0ece4" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="415" y="267" class="t-act">Preencher ID e nº sessão</text>

  <line x1="590" y1="238" x2="590" y2="254" class="edge"/>
  <rect x="500" y="254" width="180" height="26" rx="3" fill="#f0ece4" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="590" y="267" class="t-act">Drag-and-drop / clicar zona</text>

  <line x1="740" y1="238" x2="740" y2="254" class="edge"/>
  <rect x="648" y="254" width="184" height="26" rx="3" fill="#f0ece4" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="740" y="267" class="t-act">Barra progresso + % + tempo</text>

  <line x1="930" y1="238" x2="930" y2="254" class="edge"/>
  <rect x="838" y="254" width="184" height="26" rx="3" fill="#f0ece4" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="930" y="267" class="t-act">Toast "Análise concluída"</text>

  <line x1="1060" y1="238" x2="1060" y2="254" class="edge"/>
  <rect x="972"  y="254" width="176" height="26" rx="3" fill="#f0ece4" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="1060" y="267" class="t-act">Ler % + classe de risco</text>

  <line x1="1185" y1="238" x2="1185" y2="254" class="edge"/>
  <rect x="1097" y="254" width="176" height="26" rx="3" fill="#f0ece4" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="1185" y="267" class="t-act">Cards + player c/ camadas</text>

  <line x1="1306" y1="238" x2="1306" y2="254" class="edge"/>
  <rect x="1225" y="254" width="162" height="26" rx="3" fill="#f0ece4" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="1306" y="267" class="t-act">Botão "Exportar PDF"</text>

  <!-- ── RUPTURAS ── -->
  <text x="50" y="308" style="font-size:11px;fill:#b36000;font-weight:700;">⚠ Rupturas possíveis:</text>

  <rect x="50"  y="320" width="230" height="40" rx="3" fill="#fff3e0" stroke="#b36000" stroke-width="1.5"/>
  <text x="165" y="335" class="t-rupt" style="font-weight:700;">Credenciais inválidas</text>
  <text x="165" y="351" class="t-rupt">S: Mensagem de erro + retry</text>

  <rect x="310" y="320" width="240" height="40" rx="3" fill="#fff3e0" stroke="#b36000" stroke-width="1.5"/>
  <text x="430" y="335" class="t-rupt" style="font-weight:700;">Formato de vídeo inválido</text>
  <text x="430" y="351" class="t-rupt">S: Alerta + manter zona ativa</text>

  <rect x="580" y="320" width="240" height="40" rx="3" fill="#fff3e0" stroke="#b36000" stroke-width="1.5"/>
  <text x="700" y="335" class="t-rupt" style="font-weight:700;">Falha no processamento</text>
  <text x="700" y="351" class="t-rupt">S: Mensagem de erro + retry</text>

  <rect x="850" y="320" width="270" height="40" rx="3" fill="#fff3e0" stroke="#b36000" stroke-width="1.5"/>
  <text x="985" y="335" class="t-rupt" style="font-weight:700;">Frames insuficientes</text>
  <text x="985" y="351" class="t-rupt">S: Flag "Dados insuficientes"</text>

  <!-- ── LEGENDA ── -->
  <rect x="50" y="384" width="1300" height="34" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <rect x="68"  y="394" width="12" height="12" rx="2" fill="#1a1a2e"/>
  <text x="86"  y="401" class="t-leg">Objetivo principal</text>
  <rect x="240" y="394" width="12" height="12" rx="2" fill="#2c3e6e"/>
  <text x="258" y="401" class="t-leg">Sub-objetivo</text>
  <rect x="370" y="394" width="12" height="12" rx="2" fill="#fff" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="388" y="401" class="t-leg">Tarefa</text>
  <rect x="460" y="394" width="12" height="12" rx="2" fill="#f0ece4" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="478" y="401" class="t-leg">Ação na interface</text>
  <rect x="632" y="394" width="12" height="12" rx="2" fill="#fff3e0" stroke="#b36000" stroke-width="1.5"/>
  <text x="650" y="401" class="t-leg">Ruptura de comunicação</text>
</svg>
