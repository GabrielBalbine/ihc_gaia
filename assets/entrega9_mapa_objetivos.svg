<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 460" width="1500" height="460">
  <defs>
    <style>
      text { font-family: Consolas, 'Courier New', monospace; }
      .title  { font-size:15px; fill:#1a1a2e; font-weight:700; text-anchor:middle; }
      .sub    { font-size:10px; fill:#999; text-anchor:middle; }
      .t-root { font-size:13px; fill:#fff; font-weight:700; text-anchor:middle; dominant-baseline:central; }
      .t-sub  { font-size:11px; fill:#fff; font-weight:600; text-anchor:middle; dominant-baseline:central; }
      .t-task { font-size:10px; fill:#1a1a2e; text-anchor:middle; dominant-baseline:central; }
      .t-rupt { font-size:9.5px; fill:#7a4000; text-anchor:middle; dominant-baseline:central; }
      .t-rh   { font-size:11px; fill:#b36000; font-weight:700; }
      .t-leg  { font-size:10px; fill:#444; dominant-baseline:central; }
      .edge   { stroke:#1a1a2e; stroke-width:1.8; fill:none; }
    </style>
  </defs>

  <rect width="1500" height="460" fill="#f7f4ef" rx="10"/>
  <text x="750" y="28" class="title">Mapa de Objetivos — GAIA · Dra. Helena (Especialista)</text>
  <text x="750" y="46" class="sub">Barbosa e Silva (2010) — fluxo: upload de vídeo → processamento → prognóstico</text>

  <!-- RAIZ -->
  <rect x="490" y="60" width="520" height="46" rx="7" fill="#1a1a2e"/>
  <text x="750" y="77" class="t-root">Obter prognóstico auxiliar de TEA</text>
  <text x="750" y="94" class="t-root" style="font-size:10px;font-weight:400;">enviando vídeo de sessão e interpretando o resultado gerado pelo pipeline GAIA</text>

  <!-- Tronco -->
  <line x1="750" y1="106" x2="750" y2="126" class="edge"/>
  <line x1="170" y1="126" x2="1330" y2="126" class="edge"/>

  <!-- SUB 1: Acessar (X=170) -->
  <line x1="170" y1="126" x2="170" y2="144" class="edge"/>
  <rect x="60" y="144" width="220" height="42" rx="6" fill="#2c3e6e"/>
  <text x="170" y="160" class="t-sub">1. Acessar</text>
  <text x="170" y="176" class="t-sub">o sistema</text>

  <!-- SUB 2: Enviar vídeo (X=520) -->
  <line x1="520" y1="126" x2="520" y2="144" class="edge"/>
  <rect x="390" y="144" width="260" height="42" rx="6" fill="#2c3e6e"/>
  <text x="520" y="160" class="t-sub">2. Enviar vídeo</text>
  <text x="520" y="176" class="t-sub">para análise</text>

  <!-- SUB 3: Acompanhar (X=850) -->
  <line x1="850" y1="126" x2="850" y2="144" class="edge"/>
  <rect x="700" y="144" width="300" height="42" rx="6" fill="#2c3e6e"/>
  <text x="850" y="160" class="t-sub">3. Acompanhar</text>
  <text x="850" y="176" class="t-sub">processamento</text>

  <!-- SUB 4: Interpretar (X=1220) -->
  <line x1="1220" y1="126" x2="1220" y2="144" class="edge"/>
  <rect x="1060" y="144" width="320" height="42" rx="6" fill="#2c3e6e"/>
  <text x="1220" y="160" class="t-sub">4. Interpretar resultado</text>
  <text x="1220" y="176" class="t-sub">e exportar</text>

  <!-- ── TAREFAS ── -->

  <!-- Sub1: X=110, X=230 -->
  <line x1="170" y1="186" x2="170" y2="206" class="edge"/>
  <line x1="110" y1="206" x2="230" y2="206" class="edge"/>
  <line x1="110" y1="206" x2="110" y2="222" class="edge"/>
  <rect x="28" y="222" width="164" height="34" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="110" y="239" class="t-task">Selecionar perfil</text>
  <line x1="230" y1="206" x2="230" y2="222" class="edge"/>
  <rect x="148" y="222" width="164" height="34" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="230" y="239" class="t-task">Inserir credenciais</text>

  <!-- Sub2: X=445, X=595 -->
  <line x1="520" y1="186" x2="520" y2="206" class="edge"/>
  <line x1="445" y1="206" x2="595" y2="206" class="edge"/>
  <line x1="445" y1="206" x2="445" y2="222" class="edge"/>
  <rect x="358" y="222" width="174" height="34" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="445" y="239" class="t-task">Identificar paciente</text>
  <line x1="595" y1="206" x2="595" y2="222" class="edge"/>
  <rect x="508" y="222" width="174" height="34" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="595" y="239" class="t-task">Selecionar arquivo</text>

  <!-- Sub3: X=770, X=930 -->
  <line x1="850" y1="186" x2="850" y2="206" class="edge"/>
  <line x1="770" y1="206" x2="930" y2="206" class="edge"/>
  <line x1="770" y1="206" x2="770" y2="222" class="edge"/>
  <rect x="676" y="222" width="188" height="34" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="770" y="239" class="t-task">Ver progresso pipeline</text>
  <line x1="930" y1="206" x2="930" y2="222" class="edge"/>
  <rect x="836" y="222" width="188" height="34" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="930" y="239" class="t-task">Receber notificação</text>

  <!-- Sub4: X=1110, X=1250, X=1390 -->
  <line x1="1220" y1="186" x2="1220" y2="206" class="edge"/>
  <line x1="1110" y1="206" x2="1390" y2="206" class="edge"/>
  <line x1="1110" y1="206" x2="1110" y2="222" class="edge"/>
  <rect x="1018" y="222" width="184" height="34" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1110" y="239" class="t-task">Ver indicador P(TEA)</text>
  <line x1="1250" y1="206" x2="1250" y2="222" class="edge"/>
  <rect x="1158" y="222" width="184" height="34" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1250" y="239" class="t-task">Analisar métricas</text>
  <line x1="1390" y1="206" x2="1390" y2="222" class="edge"/>
  <rect x="1304" y="222" width="172" height="34" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1390" y="239" class="t-task">Exportar relatório</text>

  <!-- ── RUPTURAS ── -->
  <text x="60" y="290" class="t-rh">⚠  Rupturas possíveis</text>
  <rect x="60"   y="302" width="240" height="40" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="180"  y="318" class="t-rupt" style="font-weight:700;">Credenciais inválidas</text>
  <text x="180"  y="333" class="t-rupt">S: Mensagem de erro + retry</text>
  <rect x="330"  y="302" width="260" height="40" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="460"  y="318" class="t-rupt" style="font-weight:700;">Formato de arquivo inválido</text>
  <text x="460"  y="333" class="t-rupt">S: Alerta + manter zona de upload</text>
  <rect x="620"  y="302" width="260" height="40" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="750"  y="318" class="t-rupt" style="font-weight:700;">Falha no processamento</text>
  <text x="750"  y="333" class="t-rupt">S: Mensagem de erro + retry</text>
  <rect x="910"  y="302" width="280" height="40" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="1050" y="318" class="t-rupt" style="font-weight:700;">Frames insuficientes</text>
  <text x="1050" y="333" class="t-rupt">S: Flag "Dados insuficientes"</text>

  <!-- LEGENDA -->
  <rect x="60" y="370" width="1380" height="36" rx="5" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <rect x="80"  y="381" width="12" height="12" rx="2" fill="#1a1a2e"/>
  <text x="98"  y="388" class="t-leg">Objetivo principal</text>
  <rect x="260" y="381" width="12" height="12" rx="2" fill="#2c3e6e"/>
  <text x="278" y="388" class="t-leg">Sub-objetivo</text>
  <rect x="400" y="381" width="12" height="12" rx="2" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="418" y="388" class="t-leg">Tarefa</text>
  <rect x="510" y="381" width="12" height="12" rx="2" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="528" y="388" class="t-leg">Ruptura de comunicação</text>
  <text x="750" y="388" class="t-leg" style="fill:#999;">| Fluxo: login → upload → processamento pipeline → prognóstico → exportação</text>
</svg>
