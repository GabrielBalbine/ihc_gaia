<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 500" width="1800" height="500">
  <defs>
    <style>
      text { font-family: Consolas, 'Courier New', monospace; }
      .title { font-size:16px; fill:#1a1a2e; font-weight:700; text-anchor:middle; }
      .sub-title { font-size:11px; fill:#999; text-anchor:middle; }
      .t-root { font-size:13px; fill:#fff; font-weight:700; text-anchor:middle; dominant-baseline:central; }
      .t-sub  { font-size:12px; fill:#fff; font-weight:600; text-anchor:middle; dominant-baseline:central; }
      .t-task { font-size:11px; fill:#1a1a2e; text-anchor:middle; dominant-baseline:central; }
      .t-rupt-h { font-size:11px; fill:#b36000; font-weight:700; text-anchor:middle; }
      .t-rupt { font-size:10px; fill:#7a4000; text-anchor:middle; dominant-baseline:central; }
      .t-leg  { font-size:11px; fill:#444; dominant-baseline:central; }
      .edge   { stroke:#1a1a2e; stroke-width:1.8; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1800" height="500" fill="#f7f4ef" rx="10"/>
  <text x="900" y="32" class="title">Mapa de Objetivos — GAIA · Dra. Helena (Especialista)</text>
  <text x="900" y="50" class="sub-title">Engenharia de Usabilidade de Mayhew — Barbosa e Silva (2010)</text>

  <!-- ══════════════════════
       RAIZ  (Y=68)
  ══════════════════════ -->
  <rect x="600" y="62" width="600" height="48" rx="7" fill="#1a1a2e"/>
  <text x="900" y="80" class="t-root">Obter prognóstico auxiliar de TEA</text>
  <text x="900" y="98" class="t-root" style="font-size:11px;font-weight:400;">a partir de vídeo de sessão terapêutica</text>

  <!-- Tronco raiz → linha horizontal -->
  <line x1="900" y1="110" x2="900" y2="130" class="edge"/>
  <line x1="215" y1="130" x2="1585" y2="130" class="edge"/>

  <!-- ══════════════════════
       SUB-OBJETIVOS  (Y=130→172)
       centros: 215, 600, 1025, 1500
  ══════════════════════ -->

  <!-- Sub 1: Acessar (X=215) -->
  <line x1="215"  y1="130" x2="215"  y2="148" class="edge"/>
  <rect x="90"   y="148" width="250" height="44" rx="6" fill="#2c3e6e"/>
  <text x="215"  y="166" class="t-sub">1. Acessar</text>
  <text x="215"  y="182" class="t-sub">o sistema</text>

  <!-- Sub 2: Enviar (X=600) -->
  <line x1="600"  y1="130" x2="600"  y2="148" class="edge"/>
  <rect x="460"  y="148" width="280" height="44" rx="6" fill="#2c3e6e"/>
  <text x="600"  y="166" class="t-sub">2. Enviar vídeo</text>
  <text x="600"  y="182" class="t-sub">para análise</text>

  <!-- Sub 3: Acompanhar (X=1025) -->
  <line x1="1025" y1="130" x2="1025" y2="148" class="edge"/>
  <rect x="870"  y="148" width="310" height="44" rx="6" fill="#2c3e6e"/>
  <text x="1025" y="166" class="t-sub">3. Acompanhar</text>
  <text x="1025" y="182" class="t-sub">processamento</text>

  <!-- Sub 4: Interpretar (X=1500) -->
  <line x1="1500" y1="130" x2="1500" y2="148" class="edge"/>
  <rect x="1330" y="148" width="340" height="44" rx="6" fill="#2c3e6e"/>
  <text x="1500" y="166" class="t-sub">4. Interpretar resultado</text>
  <text x="1500" y="182" class="t-sub">e exportar</text>

  <!-- ══════════════════════
       TAREFAS  (Y=192→250)
  ══════════════════════ -->

  <!-- Sub 1 → 2 tarefas: X=140, X=290 -->
  <line x1="215"  y1="192" x2="215"  y2="212" class="edge"/>
  <line x1="140"  y1="212" x2="290"  y2="212" class="edge"/>

  <line x1="140"  y1="212" x2="140"  y2="228" class="edge"/>
  <rect x="50"   y="228" width="180" height="38" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="140"  y="247" class="t-task">Selecionar perfil</text>

  <line x1="290"  y1="212" x2="290"  y2="228" class="edge"/>
  <rect x="200"  y="228" width="180" height="38" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="290"  y="247" class="t-task">Inserir credenciais</text>

  <!-- Sub 2 → 2 tarefas: X=510, X=690 -->
  <line x1="600"  y1="192" x2="600"  y2="212" class="edge"/>
  <line x1="510"  y1="212" x2="690"  y2="212" class="edge"/>

  <line x1="510"  y1="212" x2="510"  y2="228" class="edge"/>
  <rect x="415"  y="228" width="190" height="38" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="510"  y="247" class="t-task">Identificar paciente</text>

  <line x1="690"  y1="212" x2="690"  y2="228" class="edge"/>
  <rect x="600"  y="228" width="180" height="38" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="690"  y="247" class="t-task">Selecionar arquivo</text>

  <!-- Sub 3 → 2 tarefas: X=930, X=1120 -->
  <line x1="1025" y1="192" x2="1025" y2="212" class="edge"/>
  <line x1="930"  y1="212" x2="1120" y2="212" class="edge"/>

  <line x1="930"  y1="212" x2="930"  y2="228" class="edge"/>
  <rect x="828"  y="228" width="204" height="38" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="930"  y="247" class="t-task">Ver progresso pipeline</text>

  <line x1="1120" y1="212" x2="1120" y2="228" class="edge"/>
  <rect x="1022" y="228" width="196" height="38" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1120" y="247" class="t-task">Receber notificação</text>

  <!-- Sub 4 → 3 tarefas: X=1380, X=1530, X=1680 -->
  <line x1="1500" y1="192" x2="1500" y2="212" class="edge"/>
  <line x1="1380" y1="212" x2="1680" y2="212" class="edge"/>

  <line x1="1380" y1="212" x2="1380" y2="228" class="edge"/>
  <rect x="1278" y="228" width="204" height="38" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1380" y="247" class="t-task">Ver indicador P(TEA)</text>

  <line x1="1530" y1="212" x2="1530" y2="228" class="edge"/>
  <rect x="1438" y="228" width="184" height="38" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1530" y="247" class="t-task">Analisar métricas</text>

  <line x1="1680" y1="212" x2="1680" y2="228" class="edge"/>
  <rect x="1592" y="228" width="178" height="38" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1681" y="247" class="t-task">Exportar relatório</text>

  <!-- ══════════════════════
       RUPTURAS  (Y=310)
  ══════════════════════ -->
  <text x="60" y="305" class="t-rupt-h">⚠  Rupturas possíveis</text>

  <rect x="60"   y="318" width="300" height="52" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="210"  y="338" class="t-rupt" style="font-weight:700;">Credenciais inválidas</text>
  <text x="210"  y="356" class="t-rupt">S: Exibe mensagem de erro + retry</text>

  <rect x="400"  y="318" width="300" height="52" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="550"  y="338" class="t-rupt" style="font-weight:700;">Formato de vídeo inválido</text>
  <text x="550"  y="356" class="t-rupt">S: Alerta + mantém zona de upload</text>

  <rect x="740"  y="318" width="300" height="52" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="890"  y="338" class="t-rupt" style="font-weight:700;">Falha no processamento</text>
  <text x="890"  y="356" class="t-rupt">S: Mensagem de erro + retry</text>

  <rect x="1080" y="318" width="320" height="52" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="1240" y="338" class="t-rupt" style="font-weight:700;">Frames insuficientes no vídeo</text>
  <text x="1240" y="356" class="t-rupt">S: Flag "Dados insuficientes"</text>

  <!-- ══════════════════════
       LEGENDA
  ══════════════════════ -->
  <rect x="60" y="398" width="1680" height="40" rx="5" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <rect x="80"  y="411" width="14" height="14" rx="2" fill="#1a1a2e"/>
  <text x="102" y="419" class="t-leg">Objetivo principal</text>

  <rect x="270" y="411" width="14" height="14" rx="2" fill="#2c3e6e"/>
  <text x="292" y="419" class="t-leg">Sub-objetivo</text>

  <rect x="430" y="411" width="14" height="14" rx="2" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="452" y="419" class="t-leg">Tarefa</text>

  <rect x="540" y="411" width="14" height="14" rx="2" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="562" y="419" class="t-leg">Ruptura de comunicação</text>

  <text x="780" y="419" class="t-leg" style="fill:#999;">|  Linhas: ativação hierárquica (pai → filho)  |  Rupturas listadas abaixo do diagrama principal</text>
</svg>
