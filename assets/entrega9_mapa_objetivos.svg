<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 460" width="1400" height="460">
  <defs>
    <style>
      text { font-family: Consolas, 'Courier New', monospace; }
      .title  { font-size:15px; fill:#1a1a2e; font-weight:700; text-anchor:middle; }
      .sub    { font-size:10px; fill:#999; text-anchor:middle; }
      .t-root { font-size:13px; fill:#fff; font-weight:700; text-anchor:middle; dominant-baseline:central; }
      .t-sub  { font-size:12px; fill:#fff; font-weight:600; text-anchor:middle; dominant-baseline:central; }
      .t-task { font-size:11px; fill:#1a1a2e; text-anchor:middle; dominant-baseline:central; }
      .t-rupt-h { font-size:11px; fill:#b36000; font-weight:700; }
      .t-rupt { font-size:10px; fill:#7a4000; text-anchor:middle; dominant-baseline:central; }
      .t-leg  { font-size:10px; fill:#444; dominant-baseline:central; }
      .edge   { stroke:#1a1a2e; stroke-width:1.8; fill:none; }
    </style>
  </defs>

  <rect width="1400" height="460" fill="#f7f4ef" rx="10"/>
  <text x="700" y="28" class="title">Mapa de Objetivos — GAIA · Dra. Helena (Especialista)</text>
  <text x="700" y="46" class="sub">Fluxo real implementado — gaia_app.py · Barbosa e Silva (2010)</text>

  <!-- RAIZ -->
  <rect x="480" y="60" width="440" height="46" rx="7" fill="#1a1a2e"/>
  <text x="700" y="77" class="t-root">Consultar prognóstico auxiliar de TEA</text>
  <text x="700" y="94" class="t-root" style="font-size:10px;font-weight:400;">selecionando sessão já processada pelo pipeline TITAN</text>

  <!-- Tronco -->
  <line x1="700" y1="106" x2="700" y2="126" class="edge"/>
  <line x1="230" y1="126" x2="1170" y2="126" class="edge"/>

  <!-- SUB 1: Acessar (X=230) -->
  <line x1="230" y1="126" x2="230" y2="144" class="edge"/>
  <rect x="100" y="144" width="260" height="42" rx="6" fill="#2c3e6e"/>
  <text x="230" y="160" class="t-sub">1. Acessar</text>
  <text x="230" y="176" class="t-sub">o sistema</text>

  <!-- SUB 2: Selecionar sessão (X=700) -->
  <line x1="700" y1="126" x2="700" y2="144" class="edge"/>
  <rect x="530" y="144" width="340" height="42" rx="6" fill="#2c3e6e"/>
  <text x="700" y="160" class="t-sub">2. Selecionar sessão</text>
  <text x="700" y="176" class="t-sub">para análise</text>

  <!-- SUB 3: Interpretar e exportar (X=1170) -->
  <line x1="1170" y1="126" x2="1170" y2="144" class="edge"/>
  <rect x="1010" y="144" width="320" height="42" rx="6" fill="#2c3e6e"/>
  <text x="1170" y="160" class="t-sub">3. Interpretar resultado</text>
  <text x="1170" y="176" class="t-sub">e exportar</text>

  <!-- ── TAREFAS ── -->

  <!-- Sub 1 → 2 tarefas: X=155, X=310 -->
  <line x1="230" y1="186" x2="230" y2="206" class="edge"/>
  <line x1="155" y1="206" x2="310" y2="206" class="edge"/>

  <line x1="155" y1="206" x2="155" y2="222" class="edge"/>
  <rect x="60"  y="222" width="190" height="36" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="155" y="240" class="t-task">Selecionar perfil</text>

  <line x1="310" y1="206" x2="310" y2="222" class="edge"/>
  <rect x="215" y="222" width="190" height="36" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="310" y="240" class="t-task">Inserir credenciais</text>

  <!-- Sub 2 → 2 tarefas: X=600, X=800 -->
  <line x1="700" y1="186" x2="700" y2="206" class="edge"/>
  <line x1="600" y1="206" x2="800" y2="206" class="edge"/>

  <line x1="600" y1="206" x2="600" y2="222" class="edge"/>
  <rect x="498" y="222" width="204" height="36" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="600" y="240" class="t-task">Buscar / filtrar sessão</text>

  <line x1="800" y1="206" x2="800" y2="222" class="edge"/>
  <rect x="698" y="222" width="204" height="36" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="800" y="240" class="t-task">Clicar em "Analisar"</text>

  <!-- Sub 3 → 3 tarefas: X=1060, X=1185, X=1310 -->
  <line x1="1170" y1="186" x2="1170" y2="206" class="edge"/>
  <line x1="1060" y1="206" x2="1310" y2="206" class="edge"/>

  <line x1="1060" y1="206" x2="1060" y2="222" class="edge"/>
  <rect x="962"  y="222" width="196" height="36" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1060" y="240" class="t-task">Ver indicador P(TEA)</text>

  <line x1="1185" y1="206" x2="1185" y2="222" class="edge"/>
  <rect x="1090" y="222" width="190" height="36" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1185" y="240" class="t-task">Navegar pelas abas</text>

  <line x1="1310" y1="206" x2="1310" y2="222" class="edge"/>
  <rect x="1218" y="222" width="164" height="36" rx="4" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="1300" y="240" class="t-task">Exportar relatório</text>

  <!-- ── RUPTURAS ── -->
  <text x="60" y="290" class="t-rupt-h">⚠  Rupturas possíveis</text>

  <rect x="60"   y="302" width="280" height="42" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="200"  y="320" class="t-rupt" style="font-weight:700;">Credenciais inválidas</text>
  <text x="200"  y="336" class="t-rupt">S: Mensagem de erro + retry</text>

  <rect x="375"  y="302" width="310" height="42" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="530"  y="320" class="t-rupt" style="font-weight:700;">Sessão sem dados (JSON vazio)</text>
  <text x="530"  y="336" class="t-rupt">S: Aviso "dados insuficientes"</text>

  <rect x="720"  y="302" width="300" height="42" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="870"  y="320" class="t-rupt" style="font-weight:700;">Frames insuficientes</text>
  <text x="870"  y="336" class="t-rupt">S: Flag no card da sessão</text>

  <rect x="1055" y="302" width="285" height="42" rx="4" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="1197" y="320" class="t-rupt" style="font-weight:700;">Falha na exportação PDF</text>
  <text x="1197" y="336" class="t-rupt">S: Mensagem de erro + retry</text>

  <!-- ── LEGENDA ── -->
  <rect x="60" y="370" width="1280" height="36" rx="5" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <rect x="80"  y="381" width="13" height="13" rx="2" fill="#1a1a2e"/>
  <text x="100" y="389" class="t-leg">Objetivo principal</text>
  <rect x="260" y="381" width="13" height="13" rx="2" fill="#2c3e6e"/>
  <text x="280" y="389" class="t-leg">Sub-objetivo</text>
  <rect x="400" y="381" width="13" height="13" rx="2" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <text x="420" y="389" class="t-leg">Tarefa</text>
  <rect x="510" y="381" width="13" height="13" rx="2" fill="#fff8f0" stroke="#d4820a" stroke-width="1.8"/>
  <text x="530" y="389" class="t-leg">Ruptura de comunicação</text>
  <text x="760" y="389" class="t-leg" style="fill:#999;">Nota: Upload de vídeo novo é função exclusiva do módulo Admin — fora do escopo do Especialista</text>
</svg>
